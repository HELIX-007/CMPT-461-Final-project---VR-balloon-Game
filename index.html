<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ANUSH VR Balloon Shooter</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
    }

    #scoreUI {
      position: absolute;
      top: 10px;
      right: 20px;
      color: white;
      font-size: 20px;
      z-index: 5;
    }
  </style>
</head>

<body>

<!-- START SCREEN -->
<div id="overlay">
  <h1>ANUSH</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- SCORE -->
<div id="scoreUI">
  Score: <span id="score">0</span>
</div>

<a-scene embedded>

  <a-sky color="#87CEEB"></a-sky>

  <!-- FIXED CAMERA (IMPORTANT) -->
  <a-entity id="cameraRig" camera look-controls position="0 1.6 0">

    <!-- GAZE CURSOR (FIXED) -->
    <a-entity
      cursor="fuse: true; fuseTimeout: 1000"
      raycaster="objects: .clickable"
      position="0 0 -1"
      geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
      material="color: yellow; shader: flat">
    </a-entity>

  </a-entity>

  <a-light type="ambient" intensity="1"></a-light>

  <a-plane position="0 2 -5" width="6" height="4" color="#333"></a-plane>

  <a-entity id="balloons"></a-entity>

</a-scene>

<script>
let score = 0;
let started = false;

// START GAME (user gesture unlocks everything)
function startGame() {
  document.getElementById("overlay").style.display = "none";

  if (!started) {
    started = true;
    spawnBalloons();
  }
}

// SPAWN
function spawnBalloons() {
  const container = document.getElementById("balloons");

  for (let i = -2; i <= 2; i++) {
    for (let j = 1; j <= 3; j++) {

      let balloon = document.createElement("a-entity");

      balloon.setAttribute("gltf-model", "assets/balloon.glb");
      balloon.setAttribute("position", `${i} ${j} -4.9`);
      balloon.setAttribute("scale", "0.5 0.5 0.5");

      balloon.classList.add("clickable");

      balloon.addEventListener("click", () => popBalloon(balloon));

      container.appendChild(balloon);
    }
  }
}

// POP
function popBalloon(balloon) {

  balloon.setAttribute("animation", {
    property: "scale",
    to: "0 0 0",
    dur: 150
  });

  setTimeout(() => balloon.remove(), 150);

  score += 10;
  document.getElementById("score").innerText = score;

  // safer mobile audio
  let audio = new Audio("assets/balloonpop.mp3");
  audio.play().catch(() => {});
}
</script>

</body>
</html>
