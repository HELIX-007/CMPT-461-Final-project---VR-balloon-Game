<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ANUSH VR Balloon Shooter</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; }
    #overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- ================= SPLASH SCREEN ================= -->
<div id="overlay">
  <h1>ANUSH</h1>
  <button onclick="startGame()">Start Game</button>
  <button onclick="toggleMute()" id="muteBtn">Mute: OFF</button>
</div>

<!-- ================= UI ================= -->
<div style="position:absolute; top:10px; right:20px; color:white; font-size:20px; z-index:5;">
  Score: <span id="score">0</span>
</div>

<div style="position:absolute; top:10px; left:20px; z-index:5;">
  <button onclick="pauseGame()">Pause</button>
</div>

<!-- ================= A-FRAME SCENE ================= -->
<a-scene vr-mode-ui="enabled: true">

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="balloonModel" src="balloon.glb"></a-asset-item>
    <audio id="popSound" src="balloonpop.mp3"></audio>
  </a-assets>

  <!-- Camera + Gaze Cursor -->
  <a-camera position="0 1.6 0">
    <a-cursor 
      fuse="true" 
      fuse-timeout="1000"
      color="red">
    </a-cursor>
  </a-camera>

  <!-- Light -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- Wall -->
  <a-plane position="0 2 -5" width="6" height="4" color="#333"></a-plane>

  <!-- Balloons -->
  <a-entity id="balloons"></a-entity>

</a-scene>

<script>
let score = 0;
let muted = false;
let level = 1;

function startGame() {
  document.getElementById("overlay").style.display = "none";
  spawnBalloons();
}

function toggleMute() {
  muted = !muted;
  document.getElementById("muteBtn").innerText = "Mute: " + (muted ? "ON" : "OFF");
}

function pauseGame() {
  alert("Game Paused");
  location.reload(); // simple reset
}

// ================= BALLOON SPAWNING =================
function spawnBalloons() {
  const container = document.getElementById("balloons");
  container.innerHTML = "";

  for (let i = -2; i <= 2; i++) {
    for (let j = 1; j <= 3; j++) {

      let balloon = document.createElement("a-entity");

      balloon.setAttribute("gltf-model", "#balloonModel");
      balloon.setAttribute("position", `${i} ${j} -4.9`);
      balloon.setAttribute("scale", "0.5 0.5 0.5");
      balloon.setAttribute("class", "clickable");

      balloon.addEventListener("click", () => popBalloon(balloon));

      container.appendChild(balloon);
    }
  }
}

// ================= POP LOGIC =================
function popBalloon(balloon) {
  balloon.parentNode.removeChild(balloon);

  score += 10;
  document.getElementById("score").innerText = score;

  if (!muted) {
    document.querySelector("#popSound").play();
  }

  checkLevelComplete();
}

// ================= LEVEL SYSTEM =================
function checkLevelComplete() {
  const remaining = document.querySelectorAll("#balloons a-entity").length;

  if (remaining === 0) {
    level++;

    if (level === 2) {
      alert("Level 2!");
      spawnMovingBalloons();
    } else {
      alert("You Win!");
    }
  }
}

// ================= LEVEL 2 =================
function spawnMovingBalloons() {
  const container = document.getElementById("balloons");
  container.innerHTML = "";

  for (let i = 0; i < 6; i++) {
    let balloon = document.createElement("a-entity");

    balloon.setAttribute("gltf-model", "#balloonModel");
    balloon.setAttribute("position", `${Math.random()*4-2} ${Math.random()*3+1} -4.9`);
    balloon.setAttribute("scale", "0.5 0.5 0.5");

    // Movement animation
    balloon.setAttribute("animation", {
      property: "position",
      dir: "alternate",
      dur: 2000,
      loop: true,
      to: `${Math.random()*4-2} ${Math.random()*3+1} -4.9`
    });

    balloon.addEventListener("click", () => popBalloon(balloon));

    container.appendChild(balloon);
  }
}
</script>

</body>
</html>
