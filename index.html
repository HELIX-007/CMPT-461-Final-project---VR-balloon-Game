<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ANUSH VR Balloon Shooter</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
    }

    #scoreUI {
      position: absolute;
      top: 10px;
      right: 20px;
      color: white;
      font-size: 20px;
      z-index: 5;
    }

    #pauseUI {
      position: absolute;
      top: 10px;
      left: 20px;
      z-index: 5;
    }
  </style>
</head>

<body>

<!-- SPLASH -->
<div id="overlay">
  <h1>ANUSH</h1>
  <button onclick="startGame()">Start Game</button>
  <button onclick="toggleMute()" id="muteBtn">Mute: OFF</button>
</div>

<!-- UI -->
<div id="scoreUI">
  Score: <span id="score">0</span>
</div>

<div id="pauseUI">
  <button onclick="pauseGame()">Pause</button>
</div>

<a-scene vr-mode-ui="enabled: true" renderer="antialias: true">

  <!-- ASSETS (FIXED PATHS) -->
  <a-assets timeout="10000">
    <a-asset-item id="balloonModel" src="assets/balloon.glb"></a-asset-item>
    <audio id="popSound" src="assets/balloonpop.mp3"></audio>
  </a-assets>

  <a-sky color="#87CEEB"></a-sky>

  <a-camera look-controls="magicWindowTrackingEnabled: true" position="0 1.6 0">

    <a-cursor 
      fuse="true"
      fuse-timeout="1000"
      material="color: red"
      geometry="radiusInner: 0.005; radiusOuter: 0.01">
    </a-cursor>

    <a-entity id="flash"
      geometry="primitive: circle; radius: 0.03"
      material="color: yellow; opacity: 0"
      position="0 0 -1">
    </a-entity>

  </a-camera>

  <a-light type="ambient" intensity="1"></a-light>

  <a-plane position="0 2 -5" width="6" height="4" color="#333"></a-plane>

  <a-entity id="balloons"></a-entity>

</a-scene>

<script>
let score = 0;
let muted = false;

// START
function startGame() {
  document.getElementById("overlay").style.display = "none";
  spawnBalloons();
}

// MUTE
function toggleMute() {
  muted = !muted;
  document.getElementById("muteBtn").innerText = "Mute: " + (muted ? "ON" : "OFF");
}

// PAUSE
function pauseGame() {
  location.reload();
}

// SPAWN
function spawnBalloons() {
  const container = document.getElementById("balloons");
  container.innerHTML = "";

  for (let i = -2; i <= 2; i++) {
    for (let j = 1; j <= 3; j++) {

      let balloon = document.createElement("a-entity");

      balloon.setAttribute("gltf-model", "#balloonModel");
      balloon.setAttribute("position", `${i} ${j} -4.9`);
      balloon.setAttribute("scale", "0.5 0.5 0.5");

      balloon.addEventListener("click", () => popBalloon(balloon));

      container.appendChild(balloon);
    }
  }
}

// POP
function popBalloon(balloon) {

  balloon.setAttribute("animation", {
    property: "scale",
    to: "0 0 0",
    dur: 200
  });

  setTimeout(() => balloon.remove(), 200);

  score += 10;
  document.getElementById("score").innerText = score;

  if (!muted) {
    document.querySelector("#popSound").play();
  }
}
</script>

</body>
</html>
