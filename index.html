<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Balloon Gallery | Final Project</title>
    <meta name="description" content="Mobile VR Balloon Shooting Game">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>

    <script>
      // 1. Music Toggle Logic
      AFRAME.registerComponent('music-handler', {
        init: function () {
          this.el.addEventListener('click', () => {
            let musicEntity = document.querySelector('#bgMusic');
            let isPlaying = musicEntity.components.sound.isPlaying;
            
            if (isPlaying) {
              musicEntity.components.sound.stopSound();
              this.el.setAttribute('value', 'Music: OFF');
              this.el.setAttribute('material', 'color', '#aa0000');
            } else {
              musicEntity.components.sound.playSound();
              this.el.setAttribute('value', 'Music: ON');
              this.el.setAttribute('material', 'color', '#444');
            }
          });
        }
      });

      // 2. Start Game Logic
      AFRAME.registerComponent('start-game', {
        init: function () {
          this.el.addEventListener('click', () => {
            document.querySelector('#ui-container').setAttribute('visible', 'false');
            document.querySelector('#game-elements').setAttribute('visible', 'true');
            // Transition raycaster to target balloons specifically
            document.querySelector('#cursor').setAttribute('raycaster', 'objects: .balloon');
          });
        }
      });

      // 3. Balloon Collision/Pop Logic
      let score = 0;
      AFRAME.registerComponent('balloon-target', {
        init: function () {
          this.el.addEventListener('click', () => {
            // Play your custom pop sound
            const pop = document.querySelector('#popSound');
            if(pop.components.sound) pop.components.sound.playSound();

            // Update Score
            score += 10;
            document.querySelector('#scoreBoard').setAttribute('value', 'Score: ' + score);
            
            // Visual feedback: Shrink and remove from raycaster
            this.el.setAttribute('scale', '0 0 0'); 
            this.el.classList.remove('balloon'); 
            this.el.setAttribute('visible', 'false');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene xr-mode-ui="cardboardModeEnabled: true">
      
      <a-assets>
        <a-asset-item id="balloonModel" src="assets/balloon.glb"></a-asset-item>
        <audio id="popSrc" src="assets/balloonpop.mp3" crossorigin="anonymous"></audio>
        
        <img id="groundTex" src="https://i.imgur.com/W4M2QvU.png">
        <audio id="bgMusicSrc" src="https://cdn.aframe.io/composer/audio/ambient.mp3" crossorigin="anonymous"></audio>
      </a-assets>

      <a-entity id="bgMusic" sound="src: #bgMusicSrc; loop: true; volume: 0.3"></a-entity>
      <a-entity id="popSound" sound="src: #popSrc; poolSize: 5"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          id="cursor"
          fuse="true" 
          fuse-timeout="1000"
          raycaster="objects: .clickable"
          animation__fusing="property: scale; startEvents: fusing; fill: forwards; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1000"
          animation__mouseleave="property: scale; startEvents: mouseleave; fill: backwards; to: 1 1 1; dur: 100"
          material="color: yellow; shader: flat">
        </a-cursor>
        
        <a-text id="scoreBoard" value="Score: 0" position="0 -0.5 -1" align="center" width="2" color="#FFF"></a-text>
      </a-entity>

      <a-entity id="ui-container" position="0 1.6 -2">
        <a-plane color="#222" width="2.5" height="1.5" opacity="0.9"></a-plane>
        
        <a-text value="BALLOON GALLERY VR" align="center" position="0 0.5 0.05" width="4"></a-text>
        <a-text value="Anush - CS Final Project" align="center" position="0 0.3 0.05" width="2"></a-text>

        <a-text id="musicToggle" class="clickable" music-handler
                value="Music: ON" align="center" position="0 0 0.05" 
                width="2" geometry="primitive: plane; width: 0.7; height: 0.2" material="color: #444"></a-text>

        <a-text class="clickable" start-game
                value="START GAME" align="center" position="0 -0.4 0.05" 
                width="2.5" geometry="primitive: plane; width: 0.8; height: 0.2" material="color: #28a745"></a-text>
      </a-entity>

      <a-entity id="game-elements" visible="false">
        <a-entity id="level1">
          <a-entity class="balloon clickable" balloon-target 
                    gltf-model="#balloonModel" 
                    position="-1.5 2 -4" 
                    scale="1 1 1"
                    animation="property: position; to: -1.5 2.3 -4; dir: alternate; dur: 2000; loop: true"></a-entity>
          
          <a-entity class="balloon clickable" balloon-target 
                    gltf-model="#balloonModel" 
                    position="0 1.8 -5" 
                    scale="1 1 1"
                    animation="property: position; to: 0 2.1 -5; dir: alternate; dur: 2500; loop: true"></a-entity>
          
          <a-entity class="balloon clickable" balloon-target 
                    gltf-model="#balloonModel" 
                    position="1.5 2.1 -4" 
                    scale="1 1 1"
                    animation="property: position; to: 1.5 1.8 -4; dir: alternate; dur: 1800; loop: true"></a-entity>
        </a-entity>

        <a-sky color="#87CEEB"></a-sky>
        <a-plane src="#groundTex" rotation="-90 0 0" width="50" height="50" repeat="20 20"></a-plane>
      </a-entity>

    </a-scene>
  </body>
</html>
