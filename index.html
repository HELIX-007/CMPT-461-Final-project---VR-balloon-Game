<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Balloon Gallery | Final Project</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script>
      let score = 0;
      let balloonsPopped = 0;

      // Music Component with iOS Unlock
      AFRAME.registerComponent('music-toggle', {
        init: function () {
          this.el.addEventListener('click', () => {
            let music = document.querySelector('#bgMusic').components.sound;
            // Unlock Audio Context for iOS
            if (AFRAME.utils.device.isIOS()) {
              music.el.sceneEl.audioListener.context.resume();
            }

            if (music.isPlaying) {
              music.stopSound();
              this.el.setAttribute('value', 'Music: OFF');
              this.el.setAttribute('material', 'color', '#aa0000');
            } else {
              music.playSound();
              this.el.setAttribute('value', 'Music: ON');
              this.el.setAttribute('material', 'color', '#444');
            }
          });
        }
      });

      // Start Game Logic
      AFRAME.registerComponent('start-game', {
        init: function () {
          this.el.addEventListener('click', () => {
            // Unlock audio for iOS during the first interaction
            document.querySelector('#bgMusic').sceneEl.audioListener.context.resume();
            
            document.querySelector('#ui-container').setAttribute('visible', 'false');
            document.querySelector('#ui-container').setAttribute('scale', '0 0 0');
            document.querySelector('#game-elements').setAttribute('visible', 'true');
            document.querySelector('#score-hud').setAttribute('visible', 'true');
          });
        }
      });

      // Balloon Target Logic
      AFRAME.registerComponent('balloon-target', {
        init: function () {
          this.el.addEventListener('click', () => {
            const pop = document.querySelector('#popSound').components.sound;
            pop.playSound();

            score += 10;
            balloonsPopped++;
            document.querySelector('#scoreBoard').setAttribute('value', 'Score: ' + score);
            
            // Pop Animation
            this.el.setAttribute('animation__pop', {
              property: 'scale',
              to: '0 0 0',
              dur: 150
            });

            setTimeout(() => {
              this.el.setAttribute('visible', 'false');
              this.el.classList.remove('balloon'); 
              if (balloonsPopped === 3) {
                  document.querySelector('#level1').setAttribute('visible', 'false');
                  document.querySelector('#level2').setAttribute('visible', 'true');
              }
            }, 150);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene xr-mode-ui="cardboardModeEnabled: true">
      
      <a-assets>
        <a-asset-item id="balloonModel" src="assets/balloon.glb"></a-asset-item>
        <audio id="popSoundFile" src="assets/balloonpop.mp3" crossorigin="anonymous"></audio>
        <img id="groundTex" src="https://i.imgur.com/W4M2QvU.png">
        <audio id="bgMusicSrc" src="https://cdn.aframe.io/composer/audio/ambient.mp3" crossorigin="anonymous"></audio>
      </a-assets>

      <a-entity id="bgMusic" sound="src: #bgMusicSrc; loop: true; volume: 0.3; autoplay: false"></a-entity>
      <a-entity id="popSound" sound="src: #popSoundFile; poolSize: 5"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          id="cursor"
          fuse="true" 
          fuse-timeout="1200"
          raycaster="objects: .clickable, .balloon"
          material="color: yellow; shader: flat"
          position="0 0 -1">
        </a-cursor>
        
        <a-entity id="score-hud" visible="false" position="0 -0.35 -1">
            <a-plane color="#000" opacity="0.6" width="0.5" height="0.12" position="0 0 0"></a-plane>
            <a-text id="scoreBoard" value="Score: 0" align="center" width="1.8" color="#FFF" shader="flat" position="0 0 0.01"></a-text>
        </a-entity>
      </a-entity>

      <a-entity id="ui-container" position="0 1.6 -2.5">
        <a-plane color="#111" width="2.8" height="1.8" opacity="0.95"></a-plane>
        <a-text value="BALLOON GALLERY VR" align="center" position="0 0.6 0.05" width="4.5" color="#FFD700"></a-text>
        <a-text value="Created by: ANUSH" align="center" position="0 0.4 0.05" width="2.5"></a-text>
        <a-text value="Final Project - BSc CompSci" align="center" position="0 0.25 0.05" width="1.8" color="#BBB"></a-text>
        
        <a-text id="musicToggle" class="clickable" music-toggle 
                value="Music: OFF" align="center" position="0 -0.1 0.05" 
                width="2" geometry="primitive: plane; width: 0.7; height: 0.2" material="color: #aa0000"></a-text>

        <a-text class="clickable" start-game 
                value="START GAME" align="center" position="0 -0.5 0.05" 
                width="2.5" geometry="primitive: plane; width: 0.8; height: 0.2" material="color: #28a745"></a-text>
      </a-entity>

      <a-entity id="game-elements" visible="false">
        
        <a-entity id="level1">
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="-1.2 2 -4" scale="1 1 1"
                    animation="property: position; to: -1.2 2.2 -4; dir: alternate; dur: 2000; loop: true"></a-entity>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="0 2.5 -5" scale="1 1 1"
                    animation="property: position; to: 0 2.8 -5; dir: alternate; dur: 2500; loop: true"></a-entity>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="1.2 1.8 -3" scale="1 1 1"
                    animation="property: position; to: 1.2 2.0 -3; dir: alternate; dur: 1800; loop: true"></a-entity>
        </a-entity>

        <a-entity id="level2" visible="false">
          <a-text value="LEVEL 2: MOVING TARGETS" position="0 3.5 -5" align="center" color="#FFD700" width="6"></a-text>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="-3 1.5 -5" 
                    animation="property: position; to: 3 1.5 -5; dir: alternate; dur: 3000; loop: true"></a-entity>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="0 2 -6" 
                    animation="property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear"></a-entity>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="2 3 -4" 
                    animation="property: position; to: 2 1 -4; dir: alternate; dur: 1500; loop: true"></a-entity>
        </a-entity>

        <a-sky color="#87CEEB"></a-sky>
        <a-plane src="#groundTex" rotation="-90 0 0" width="50" height="50" repeat="20 20"></a-plane>
        
        <a-entity light="type: ambient; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; intensity: 0.6" position="-1 3 1"></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
