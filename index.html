<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Balloon Gallery | Final Project</title>
    <meta name="description" content="Mobile VR Balloon Shooting Game">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script>
      // 1. Music Toggle Logic
      AFRAME.registerComponent('music-handler', {
        init: function () {
          this.el.addEventListener('click', () => {
            let music = document.querySelector('#bgMusic');
            let status = music.components.sound.data.autoplay;
            if (music.components.sound.isPlaying) {
              music.components.sound.stopSound();
              this.el.setAttribute('value', 'Music: OFF');
            } else {
              music.components.sound.playSound();
              this.el.setAttribute('value', 'Music: ON');
            }
          });
        }
      });

      // 2. Start Game Logic
      AFRAME.registerComponent('start-game', {
        init: function () {
          this.el.addEventListener('click', () => {
            document.querySelector('#ui-container').setAttribute('visible', 'false');
            document.querySelector('#game-elements').setAttribute('visible', 'true');
            // Logic to start Level 1
          });
        }
      });

      // 3. Balloon Collision/Pop Logic
      let score = 0;
      AFRAME.registerComponent('balloon-target', {
        init: function () {
          this.el.addEventListener('click', () => {
            // Play pop sound
            document.querySelector('#popSound').components.sound.playSound();
            // Update Score
            score += 10;
            document.querySelector('#scoreBoard').setAttribute('value', 'Score: ' + score);
            // Hide/Remove balloon
            this.el.setAttribute('visible', 'false');
            this.el.setAttribute('scale', '0 0 0'); // Remove collision box
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="balloonModel" src="assets/balloon.glb"></a-asset-item>
        <audio id="popSrc" src="assets/pop.mp3" crossorigin="anonymous"></audio>
        <audio id="bgMusicSrc" src="assets/bg_music.mp3" crossorigin="anonymous"></audio>
      </a-assets>

      <a-entity id="bgMusic" sound="src: #bgMusicSrc; loop: true; volume: 0.5"></a-entity>
      <a-entity id="popSound" sound="src: #popSrc; poolSize: 5"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          id="cursor"
          animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
          animation__fusing="property: fuse; startEvents: fusing; from: 0.1 0.1 0.1; to: 1 1 1; dur: 1000"
          event-set__mouseenter="_event: mouseenter; color: springgreen"
          event-set__mouseleave="_event: mouseleave; color: black"
          raycaster="objects: .clickable">
        </a-cursor>
        
        <a-text id="scoreBoard" value="Score: 0" position="0.8 0.6 -1" width="2" color="#FFF"></a-text>
      </a-entity>

      <a-entity id="ui-container" position="0 1.6 -2.5">
        <a-plane color="#222" width="3" height="2" opacity="0.8"></a-plane>
        
        <a-text value="BALLOON GALLERY VR" align="center" position="0 0.7 0.1" width="4"></a-text>
        <a-text value="By: Your Name - Student ID" align="center" position="0 0.5 0.1" width="2"></a-text>

        <a-text id="musicToggle" class="clickable" music-handler
                value="Music: ON" align="center" position="0 0.1 0.1" 
                width="2.5" geometry="primitive: plane; width: 0.8; height: 0.2" material="color: #444"></a-text>

        <a-text class="clickable" start-game
                value="START GAME" align="center" position="0 -0.4 0.1" 
                width="3" geometry="primitive: plane; width: 1; height: 0.3" material="color: #28a745"></a-text>
      </a-entity>

      <a-entity id="game-elements" visible="false">
        <a-entity id="level1">
          <a-box class="clickable" balloon-target position="-1.5 2 -4" color="red" animation="property: position; to: -1.5 2.2 -4; dir: alternate; dur: 2000; loop: true"></a-box>
          <a-box class="clickable" balloon-target position="0 1.8 -4" color="blue"></a-box>
          <a-box class="clickable" balloon-target position="1.5 2.1 -4" color="yellow"></a-box>
        </a-entity>

        <a-sky color="#87CEEB"></a-sky>
        <a-plane rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
      </a-entity>

    </a-scene>
  </body>
</html>
