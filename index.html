<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ANUSH VR Balloon Shooter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #overlay {
      position: absolute; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); color: white;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 10; font-family: sans-serif;
      text-align: center;
    }
    button { padding: 15px 30px; font-size: 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 8px; }
  </style>
</head>

<body>

<div id="overlay">
  <h1>ANUSH</h1>
  <p>Final Project: Mobile VR Balloon Shooter</p>
  <p style="font-size: 0.9em; color: #aaa;">Gaze at balloons for 1 second to pop them.<br>No hands required!</p>
  <button onclick="startGame()">Start Game</button>
</div>

<a-scene xr-mode-ui="cardboardModeEnabled: true">
  <a-assets>
    <a-asset-item id="balloonModel" src="assets/balloon.glb"></a-asset-item>
    <audio id="popSound" src="assets/balloonpop.mp3" crossorigin="anonymous"></audio>
  </a-assets>

  <a-sky color="#87CEEB"></a-sky>

  <a-entity id="cameraRig">
    <a-entity camera look-controls position="0 1.6 0">
      
      <a-entity
        id="myCursor"
        cursor="fuse: true; fuseTimeout: 1000"
        raycaster="objects: .clickable"
        position="0 0 -1"
        geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
        material="color: yellow; shader: flat"
        animation__fusing="property: scale; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1000; startEvents: fusing"
        animation__mouseleave="property: scale; to: 1 1 1; dur: 100; startEvents: mouseleave">
      </a-entity>

      <a-entity id="hud-container" position="-0.4 0.3 -1">
          <a-plane color="#000" opacity="0.5" width="0.5" height="0.15" position="0 0 0"></a-plane>
          <a-text id="vrScore" 
                  value="Score: 0" 
                  align="center" 
                  width="2" 
                  color="white" 
                  shader="flat" 
                  position="0 0 0.02"
                  negate="false">
          </a-text>
      </a-entity>
    </a-entity>
  </a-entity>

  <a-entity id="popSoundEntity" sound="src: #popSound; poolSize: 5"></a-entity>
  <a-light type="ambient" intensity="0.8"></a-light>
  <a-plane position="0 2 -5.1" width="10" height="6" color="#444"></a-plane>
  <a-entity id="balloonsContainer"></a-entity>
</a-scene>

<script>
let score = 0;
let balloonsPopped = 0;

function startGame() {
  document.getElementById("overlay").style.display = "none";
  const sceneEl = document.querySelector('a-scene');
  if (sceneEl.audioListener) { sceneEl.audioListener.context.resume(); }
  spawnLevel1();
}

function spawnLevel1() {
  const container = document.getElementById("balloonsContainer");
  for (let x = -1.5; x <= 1.5; x += 1.5) {
    for (let y = 1.5; y <= 3.5; y += 1) {
      let balloon = document.createElement("a-entity");
      balloon.setAttribute("gltf-model", "#balloonModel");
      balloon.setAttribute("position", {x: x, y: y, z: -5});
      balloon.setAttribute("scale", "0.5 0.5 0.5");
      balloon.classList.add("clickable");
      balloon.addEventListener("click", () => popBalloon(balloon));
      container.appendChild(balloon);
    }
  }
}

function popBalloon(el) {
  const sound = document.querySelector('#popSoundEntity');
  if (sound.components.sound) { sound.components.sound.playSound(); }

  score += 10;
  const scoreEl = document.querySelector('#vrScore');
  scoreEl.setAttribute('value', 'Score: ' + score);
  
  // Force re-render nudge
  scoreEl.object3D.position.z = 0.021; 
  setTimeout(() => { scoreEl.object3D.position.z = 0.02; }, 10);

  el.setAttribute('animation', {
    property: 'scale',
    to: '0 0 0',
    dur: 150
  });

  setTimeout(() => {
    if (el.parentNode) {
      el.parentNode.removeChild(el);
      balloonsPopped++;
      checkLevel();
    }
  }, 150);
}

function checkLevel() {
  if (balloonsPopped === 9) {
    spawnLevel2();
  }
}

function spawnLevel2() {
  const container = document.getElementById("balloonsContainer");
  for (let i = 0; i < 6; i++) {
    let b = document.createElement("a-entity");
    b.setAttribute("gltf-model", "#balloonModel");
    b.setAttribute("class", "clickable");
    b.setAttribute("scale", "0.4 0.4 0.4");
    let startX = (Math.random() * 4) - 2;
    b.setAttribute("position", `${startX} ${Math.random() * 2 + 1} -4`);
    b.setAttribute("animation__move", {
      property: "position",
      to: `${-startX} ${Math.random() * 2 + 1} -4`,
      dur: 3000 + (Math.random() * 2000),
      dir: "alternate",
      loop: true
    });
    b.addEventListener("click", () => popBalloon(b));
    container.appendChild(b);
  }
}
</script>
</body>
</html>
