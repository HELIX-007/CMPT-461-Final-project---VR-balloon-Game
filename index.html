<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Balloon Gallery | Final Project</title>
    <script src="[aframe.io](https://aframe.io/releases/1.5.0/aframe.min.js)"></script>
    <script>
      let score = 0;
      let balloonsPopped = 0;

      AFRAME.registerComponent('music-handler', {
        init: function () {
          this.el.addEventListener('click', () => {
            let musicEntity = document.querySelector('#bgMusic');
            let soundComponent = musicEntity.components.sound;
            
            if (soundComponent.isPlaying) {
              soundComponent.stopSound();
              this.el.setAttribute('value', 'Music: OFF');
              this.el.setAttribute('material', 'color', '#aa0000');
            } else {
              soundComponent.playSound();
              this.el.setAttribute('value', 'Music: ON');
              this.el.setAttribute('material', 'color', '#00aa00');
            }
          });
        }
      });

      AFRAME.registerComponent('start-game', {
        init: function () {
          this.el.addEventListener('click', () => {
            document.querySelector('#ui-container').setAttribute('visible', 'false');
            document.querySelector('#game-elements').setAttribute('visible', 'true');
            
            // Update raycaster to target balloons
            document.querySelector('#cursor').setAttribute('raycaster', 'objects', '.clickable, .balloon');
          });
        }
      });

      AFRAME.registerComponent('balloon-target', {
        init: function () {
          this.el.addEventListener('click', () => {
            // Prevent double-clicks
            if (!this.el.getAttribute('visible')) return;
            
            const pop = document.querySelector('#popSound');
            if (pop && pop.components.sound) {
              pop.components.sound.playSound();
            }

            score += 10;
            balloonsPopped++;
            document.querySelector('#scoreBoard').setAttribute('value', 'Score: ' + score);
            
            this.el.setAttribute('animation__pop', {
              property: 'scale',
              to: '0 0 0',
              dur: 150,
              easing: 'easeInBack'
            });

            const el = this.el;
            setTimeout(() => {
              el.setAttribute('visible', 'false');
              el.classList.remove('balloon');
              el.classList.remove('clickable');

              if (balloonsPopped === 3) {
                document.querySelector('#level1').setAttribute('visible', 'false');
                document.querySelector('#level2').setAttribute('visible', 'true');
              }
            }, 150);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene xr-mode-ui="cardboardModeEnabled: true">
      
      <a-assets>
        <a-asset-item id="balloonModel" src="assets/balloon.glb"></a-asset-item>
        <audio id="popSoundFile" src="assets/balloonpop.mp3" crossorigin="anonymous" preload="auto"></audio>
        <img id="groundTex" src="[i.imgur.com](https://i.imgur.com/W4M2QvU.png)" crossorigin="anonymous">
        <audio id="bgMusicSrc" src="[cdn.aframe.io](https://cdn.aframe.io/composer/audio/ambient.mp3)" crossorigin="anonymous" preload="auto"></audio>
      </a-assets>

      <a-entity id="bgMusic" sound="src: #bgMusicSrc; loop: true; volume: 0.2; autoplay: false"></a-entity>
      <a-entity id="popSound" sound="src: #popSoundFile; poolSize: 5"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          id="cursor"
          fuse="true" 
          fuse-timeout="1000"
          raycaster="objects: .clickable"
          material="color: yellow; shader: flat"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
          position="0 0 -1">
        </a-cursor>
        
        <a-entity id="hud-score" position="0 -0.4 -1">
          <a-plane color="#000" opacity="0.6" width="0.6" height="0.15"></a-plane>
          <a-text id="scoreBoard" value="Score: 0" align="center" width="2" color="#FFF" position="0 0 0.01"></a-text>
        </a-entity>
      </a-entity>

      <a-entity id="ui-container" position="0 1.6 -2.5">
        <a-plane color="#222" width="2.5" height="1.5" opacity="0.9"></a-plane>
        <a-text value="BALLOON GALLERY VR" align="center" position="0 0.5 0.01" width="4" color="#FFF"></a-text>
        <a-text value="Anush - CS Final Project" align="center" position="0 0.3 0.01" width="2" color="#CCC"></a-text>
        
        <a-entity id="musicToggle" class="clickable" music-handler position="0 0 0.01">
          <a-plane width="0.8" height="0.2" color="#aa0000"></a-plane>
          <a-text value="Music: OFF" align="center" width="2" color="#FFF" position="0 0 0.01"></a-text>
        </a-entity>

        <a-entity id="startButton" class="clickable" start-game position="0 -0.4 0.01">
          <a-plane width="0.9" height="0.25" color="#28a745"></a-plane>
          <a-text value="START GAME" align="center" width="2.5" color="#FFF" position="0 0 0.01"></a-text>
        </a-entity>
      </a-entity>

      <a-entity id="game-elements" visible="false">
        <a-sky color="#87CEEB"></a-sky>
        <a-plane src="#groundTex" rotation="-90 0 0" width="50" height="50" repeat="25 25"></a-plane>
        
        <a-entity light="type: ambient; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; intensity: 0.6" position="-1 3 1"></a-entity>

        <a-entity id="level1">
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="-1.2 2 -4" scale="1 1 1"
                    animation="property: position; to: -1.2 2.2 -4; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-entity>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="0 2.5 -5" scale="1 1 1"
                    animation="property: position; to: 0 2.8 -5; dir: alternate; dur: 2500; loop: true; easing: easeInOutSine"></a-entity>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="1.2 1.8 -3" scale="1 1 1"
                    animation="property: position; to: 1.2 2.0 -3; dir: alternate; dur: 1800; loop: true; easing: easeInOutSine"></a-entity>
        </a-entity>

        <a-entity id="level2" visible="false">
          <a-text value="LEVEL 2" position="0 3.5 -4" align="center" color="#FFD700" width="5"></a-text>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="-2 1.5 -4" scale="1 1 1"
                    animation="property: position; to: 2 1.5 -4; dir: alternate; dur: 3000; loop: true"></a-entity>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="0 2 -6" scale="1 1 1"
                    animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear"></a-entity>
          <a-entity class="balloon clickable" balloon-target gltf-model="#balloonModel" position="1.5 3 -3" scale="1 1 1"
                    animation="property: position; to: 1.5 1 -3; dir: alternate; dur: 1200; loop: true"></a-entity>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
