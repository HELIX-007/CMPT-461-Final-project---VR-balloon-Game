<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ANUSH VR Balloon Shooter</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
    }

    #scoreUI {
      position: absolute;
      top: 10px;
      right: 20px;
      color: white;
      font-size: 20px;
      z-index: 5;
    }

    #pauseUI {
      position: absolute;
      top: 10px;
      left: 20px;
      z-index: 5;
    }
  </style>
</head>

<body>

<!-- ================= SPLASH SCREEN ================= -->
<div id="overlay">
  <h1>ANUSH</h1>
  <button onclick="startGame()">Start Game</button>
  <button onclick="toggleMute()" id="muteBtn">Mute: OFF</button>
</div>

<!-- ================= UI ================= -->
<div id="scoreUI">
  Score: <span id="score">0</span>
</div>

<div id="pauseUI">
  <button onclick="pauseGame()">Pause</button>
</div>

<!-- ================= A-FRAME ================= -->
<a-scene vr-mode-ui="enabled: true" renderer="antialias: true">

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="balloonModel" src="balloon.glb"></a-asset-item>
    <audio id="popSound" src="balloonpop.mp3"></audio>
  </a-assets>

  <!-- Sky -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Camera -->
  <a-camera look-controls="magicWindowTrackingEnabled: true" position="0 1.6 0">

    <!-- Gaze Cursor -->
    <a-cursor 
      fuse="true"
      fuse-timeout="1000"
      material="color: red; shader: flat"
      geometry="radiusInner: 0.005; radiusOuter: 0.01"
      animation__click="property: scale; startEvents: click; from: 1 1 1; to: 0.8 0.8 0.8; dur: 150"
      animation__fusing="property: scale; startEvents: fusing; to: 1.3 1.3 1.3; dur: 1000">
    </a-cursor>

    <!-- Flash -->
    <a-entity id="flash"
      geometry="primitive: circle; radius: 0.03"
      material="color: yellow; opacity: 0"
      position="0 0 -1">
    </a-entity>

  </a-camera>

  <!-- Lighting -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- Wall -->
  <a-plane position="0 2 -5" width="6" height="4" color="#333"></a-plane>

  <!-- Balloons -->
  <a-entity id="balloons"></a-entity>

</a-scene>

<script>
let score = 0;
let muted = false;
let level = 1;

// ================= START =================
function startGame() {
  document.getElementById("overlay").style.display = "none";
  spawnLevel1();
}

// ================= MUTE =================
function toggleMute() {
  muted = !muted;
  document.getElementById("muteBtn").innerText = "Mute: " + (muted ? "ON" : "OFF");
}

// ================= PAUSE =================
function pauseGame() {
  alert("Game Paused");
  location.reload();
}

// ================= FLASH =================
function flashEffect() {
  let flash = document.querySelector("#flash");
  flash.setAttribute("material", "opacity", 1);

  setTimeout(() => {
    flash.setAttribute("material", "opacity", 0);
  }, 100);
}

// ================= RECOIL =================
function recoil() {
  let cam = document.querySelector("a-camera");

  cam.setAttribute("animation", {
    property: "rotation",
    to: "-2 0 0",
    dur: 100,
    dir: "alternate"
  });
}

// ================= LEVEL 1 =================
function spawnLevel1() {
  const container = document.getElementById("balloons");
  container.innerHTML = "";

  for (let i = -2; i <= 2; i++) {
    for (let j = 1; j <= 3; j++) {

      let balloon = document.createElement("a-entity");

      balloon.setAttribute("gltf-model", "#balloonModel");
      balloon.setAttribute("position", `${i} ${j} -4.9`);
      balloon.setAttribute("scale", "0.5 0.5 0.5");

      balloon.addEventListener("click", () => popBalloon(balloon));

      container.appendChild(balloon);
    }
  }
}

// ================= LEVEL 2 =================
function spawnLevel2() {
  const container = document.getElementById("balloons");
  container.innerHTML = "";

  for (let i = 0; i < 6; i++) {

    let balloon = document.createElement("a-entity");

    balloon.setAttribute("gltf-model", "#balloonModel");
    balloon.setAttribute("position", `${Math.random()*4-2} ${Math.random()*3+1} -4.9`);
    balloon.setAttribute("scale", "0.5 0.5 0.5");

    balloon.setAttribute("animation", {
      property: "position",
      dir: "alternate",
      dur: 2000,
      loop: true,
      to: `${Math.random()*4-2} ${Math.random()*3+1} -4.9`
    });

    balloon.addEventListener("click", () => popBalloon(balloon));

    container.appendChild(balloon);
  }
}

// ================= POP =================
function popBalloon(balloon) {

  balloon.setAttribute("animation", {
    property: "scale",
    to: "0 0 0",
    dur: 200
  });

  setTimeout(() => {
    if (balloon.parentNode) {
      balloon.parentNode.removeChild(balloon);
    }
  }, 200);

  score += 10;
  document.getElementById("score").innerText = score;

  if (!muted) {
    document.querySelector("#popSound").play();
  }

  flashEffect();
  recoil();
  checkLevel();
}

// ================= LEVEL CHECK =================
function checkLevel() {
  const remaining = document.querySelectorAll("#balloons a-entity").length;

  if (remaining === 0) {
    level++;

    if (level === 2) {
      setTimeout(() => {
        alert("Level 2!");
        spawnLevel2();
      }, 300);
    } else {
      setTimeout(() => {
        alert("You Win!");
      }, 300);
    }
  }
}
</script>

</body>
</html>
